# Spring Boot application configuration for Form Builder backend

spring:
  application:
    name: formbuilder

  datasource:
    #url: jdbc:postgresql://localhost:5432/formbuilder
    #username: ${DB_USERNAME}
    #password: ${DB_PASSWORD}
    url: jdbc:postgresql://localhost:5432/formbuilderdb
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  sql:
    init:
      mode: always                          # runs schema files on every startup
      separator: "^"                        # custom separator for PostgreSQL functions with $$
      schema-locations:
        - classpath:schema.sql
        - classpath:migration_add_validation_json.sql
        - classpath:migration_add_multiple_choice.sql
        - classpath:migration_add_linear_scale.sql
        - classpath:migration_add_grid.sql
        - classpath:migration_add_status.sql
        - classpath:migration_add_page_break.sql
        - classpath:migration_add_calculated_fields.sql
        - classpath:migration_add_form_groups.sql
        - classpath:migration_add_field_groups.sql
        - classpath:migration_add_disabled_readonly.sql
        - classpath:migration_add_rules_to_groups.sql
        - classpath:migration_add_soft_delete.sql
        - classpath:migration_add_rbac.sql
        - classpath:migration_add_workflow_engine.sql
        - classpath:migration_add_builder_assignment.sql
        - classpath:migration_consolidate_auth.sql

  jpa:
    hibernate:
      ddl-auto: none                        # CRITICAL: Hibernate must NOT touch schema
    open-in-view: false                     # avoid lazy-loading pitfalls in REST layer
    show-sql: true                          # log all JPA-generated SQL for debugging
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: strict   # strict prevents Edge tracking-prevention from blocking it
        secure: false        # set true in production (HTTPS only)
        name: JSESSIONID
        path: /              # cookie valid for all paths

logging:
  level:
    org.springframework.security: DEBUG
    com.formbuilder: DEBUG
    org.springframework.jdbc: DEBUG
