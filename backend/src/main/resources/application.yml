spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/formbuilder
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  sql:
    init:
      mode: always                          # runs schema files on every startup
      separator: "^"                        # custom separator for PostgreSQL functions with $$
      schema-locations:
        - classpath:users_schema.sql                  # users + authorities (Spring Security)
        - classpath:schema.sql                        # forms + form_fields
        - classpath:migration_add_validation_json.sql # ensures validation_json column exists

  jpa:
    hibernate:
      ddl-auto: none                        # CRITICAL: Hibernate must NOT touch schema
    open-in-view: false                     # avoid lazy-loading pitfalls in REST layer
    show-sql: true                          # log all JPA-generated SQL for debugging
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  servlet:
    session:
      timeout: 30m                          # session lifetime
      cookie:
        http-only: true                     # JS cannot read the cookie
        same-site: lax                      # allows cookie on same-site navigations (not strict cross-site)
        secure: false                       # set true in production (HTTPS)
        name: JSESSIONID

logging:
  level:
    org.springframework.security: DEBUG
    com.formbuilder: DEBUG
    org.springframework.jdbc: DEBUG
